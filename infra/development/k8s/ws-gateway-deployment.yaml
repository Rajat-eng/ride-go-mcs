apiVersion: apps/v1
kind: Deployment
metadata:
  name: ws-gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ws-gateway
  template:
    metadata:
      labels:
        app: ws-gateway
    spec:
      initContainers:
        - name: wait-for-dependencies
          image: busybox:1.36 # busybox is a minimal image that includes the nc (netcat) command, which we can use to check if a TCP port is open
          command:
            - sh
            - -c
            - |
              until nc -z redis 6379; do echo "waiting for redis:6379"; sleep 2; done
              until nc -z rabbitmq 5672; do echo "waiting for rabbitmq:5672"; sleep 2; done
              until nc -z driver-service 9092; do echo "waiting for driver-service:9092"; sleep 2; done
              until nc -z otel-collector 4317; do echo "waiting for otel-collector:4317"; sleep 2; done
      containers:
        - name: ws-gateway
          image: ride-sharing/ws-gateway
          ports:
            - containerPort: 8082
          startupProbe:
            tcpSocket:
              port: 8082
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 12
          readinessProbe:
            httpGet:
              path: /
              port: 8082
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /
              port: 8082
            initialDelaySeconds: 15
            periodSeconds: 15
            timeoutSeconds: 2
            failureThreshold: 3
          resources:
            requests:
              memory: "128Mi"
              cpu: "125m"
            limits:
              memory: "256Mi"
              cpu: "250m"
          env:
            - name: HTTP_ADDR
              value: ":8082"
            - name: RABBITMQ_URI
              valueFrom:
                secretKeyRef:
                  name: rabbitmq-credentials
                  key: uri
            - name: REDIS_URI
              valueFrom:
                configMapKeyRef:
                  key: REDIS_URI
                  name: app-config
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: jwt-secrets
                  key: secret
            - name: DRIVER_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  key: DRIVER_SERVICE_URL
                  name: app-config
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              valueFrom:
                configMapKeyRef:
                  key: OTEL_EXPORTER_OTLP_ENDPOINT
                  name: app-config
            - name: ALLOWED_ORIGINS
              valueFrom:
                configMapKeyRef:
                  key: ALLOWED_ORIGINS
                  name: app-config
---
apiVersion: v1
kind: Service
metadata:
  name: ws-gateway
spec:
  type: LoadBalancer
  ports:
    - port: 8082
      targetPort: 8082
  selector:
    app: ws-gateway
