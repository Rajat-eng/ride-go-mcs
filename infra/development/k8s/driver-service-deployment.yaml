apiVersion: apps/v1
kind: Deployment
metadata:
  name: driver-service      
spec:
  replicas: 1
  selector:
    matchLabels:
      app: driver-service 
  template:
    metadata:
      labels:
        app: driver-service 
    spec:
      initContainers:
        - name: wait-for-dependencies
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z redis 6379; do echo "waiting for redis:6379"; sleep 2; done
              until nc -z rabbitmq 5672; do echo "waiting for rabbitmq:5672"; sleep 2; done
              until nc -z otel-collector 4317; do echo "waiting for otel-collector:4317"; sleep 2; done
      containers:
        - name: driver-service
          image: ride-sharing/driver-service
          ports:
            - name: http
              containerPort: 9092
          startupProbe:
            tcpSocket:
              port: 9092
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 12
          readinessProbe:
            tcpSocket:
              port: 9092
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          livenessProbe:
            tcpSocket:
              port: 9092
            initialDelaySeconds: 15
            periodSeconds: 15
            timeoutSeconds: 2
            failureThreshold: 3
          resources:
            requests:
              memory: "64Mi"
              cpu: "100m"
            limits:
              memory: "128Mi"
              cpu: "200m"
          env:
            - name: RABBITMQ_URI
              valueFrom:
                secretKeyRef:
                  name: rabbitmq-credentials
                  key: uri
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              valueFrom:
                configMapKeyRef:
                  key: OTEL_EXPORTER_OTLP_ENDPOINT
                  name: app-config
---
apiVersion: v1 
kind: Service      
metadata:
  name: driver-service
spec:
  selector:
    app: driver-service
  ports:
    - name: http
      port: 9092
      targetPort: 9092
  type: ClusterIP

