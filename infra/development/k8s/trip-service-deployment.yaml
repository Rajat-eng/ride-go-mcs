apiVersion: apps/v1
kind: Deployment
metadata:
  name: trip-service      
spec:
  replicas: 1
  selector:
    matchLabels:
      app: trip-service 
  template:
    metadata:
      labels:
        app: trip-service 
    spec:
      initContainers:
        - name: wait-for-dependencies
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z redis 6379; do echo "waiting for redis:6379"; sleep 2; done
              until nc -z rabbitmq 5672; do echo "waiting for rabbitmq:5672"; sleep 2; done
              until nc -z otel-collector 4317; do echo "waiting for otel-collector:4317"; sleep 2; done
      containers:
        - name: trip-service
          image: ride-sharing/trip-service
          ports:
            - name: http
              containerPort: 8083
            - name: grpc
              containerPort: 9093
          startupProbe:
            tcpSocket:
              port: 9093
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 12
          readinessProbe:
            tcpSocket:
              port: 9093
            initialDelaySeconds: 3
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 8083
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          resources:
            requests:
              memory: "64Mi"
              cpu: "100m"
            limits:
              memory: "128Mi"
              cpu: "200m"
          env:
            - name: RABBITMQ_URI
              valueFrom:
                secretKeyRef:
                  name: rabbitmq-credentials
                  key: uri
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              valueFrom:
                configMapKeyRef:
                  key: OTEL_EXPORTER_OTLP_ENDPOINT
                  name: app-config

            - name: MONGODB_URI
              valueFrom:
                secretKeyRef:
                  name: mongodb
                  key: uri
            - name: REDIS_URI
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: REDIS_URI
---
apiVersion: v1 
kind: Service      
metadata:
  name: trip-service
spec:
  selector:
    app: trip-service
  ports:
    - name: http
      port: 8083
      targetPort: 8083
    - name: grpc
      port: 9093
      targetPort: 9093
  type: ClusterIP

