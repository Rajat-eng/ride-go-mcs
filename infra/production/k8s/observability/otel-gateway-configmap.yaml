apiVersion: v1
kind: ConfigMap 
metadata:
  name: otel-collector-gateway-config
  namespace: default
data:
  collector-gateway.yaml: |
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318

    processors:
      resource:
        attributes:
          - key: deployment.environment
            value: production
            action: upsert
      memory_limiter:
        check_interval: 5s
        limit_mib: 256
        spike_limit_mib: 64
      batch:
        send_batch_size: 1024
        timeout: 5s

    exporters:
      prometheus:
        endpoint: 0.0.0.0:9464
      loki:
        endpoint: http://loki:3100/loki/api/v1/push

    extensions:
      health_check:
        endpoint: 0.0.0.0:13133

    service:
      extensions: [health_check]
      telemetry:
        logs:
          level: info
      pipelines:
        metrics:
          receivers: [otlp]
          processors: [resource, memory_limiter, batch]
          exporters: [prometheus]
        logs:
          receivers: [otlp]
          processors: [resource, memory_limiter, batch]
          exporters: [loki]
