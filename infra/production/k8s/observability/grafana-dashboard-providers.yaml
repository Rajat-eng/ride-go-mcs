apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-providers
  namespace: default
data:
  dashboards.yaml: |
    apiVersion: 1
    providers:
      - name: Production Dashboards
        orgId: 1
        folder: Platform
        type: file
        disableDeletion: false
        allowUiUpdates: true
        options:
          path: /var/lib/grafana/dashboards
