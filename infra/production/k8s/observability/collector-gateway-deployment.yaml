apiVersion: apps/v1
kind: Deployment
metadata:
  name: otel-collector-gateway
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: otel-collector-gateway
  template:
    metadata:
      labels:
        app: otel-collector-gateway
    spec:
      containers:
        - name: otel-collector-gateway
          image: otel/opentelemetry-collector-contrib:0.102.1
          args:
            - --config=/etc/otelcol/collector-gateway.yaml
          ports:
            - name: metrics
              containerPort: 9464
            - name: health
              containerPort: 13133
            - name: otlp-grpc
              containerPort: 4317
            - name: otlp-http
              containerPort: 4318
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          volumeMounts:
            - name: otel-collector-gateway-config
              mountPath: /etc/otelcol
          startupProbe:
            httpGet:
              path: /
              port: 13133
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 12
          readinessProbe:
            httpGet:
              path: /
              port: 13133
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 13133
            initialDelaySeconds: 10
            periodSeconds: 15
      volumes:
        - name: otel-collector-gateway-config
          configMap:
            name: otel-collector-gateway-config
---
apiVersion: v1
kind: Service
metadata:
  name: otel-collector
  namespace: default
spec:
  selector:
    app: otel-collector-gateway
  ports:
    - name: metrics
      port: 9464
      targetPort: 9464
    - name: health
      port: 13133
      targetPort: 13133
    - name: otlp-grpc
      port: 4317
      targetPort: 4317
    - name: otlp-http
      port: 4318
      targetPort: 4318
  type: ClusterIP
