name: CD

on:
  workflow_dispatch:
  workflow_run:
    workflows:
      - CI
    types:
      - completed
    branches:
      - main

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: ${{ vars.AWS_REGION }} #ap-south-1
  ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY }} #ride-go-mcs
  ECR_REPOSITORY_PREFIX: ${{ vars.ECR_REPOSITORY_PREFIX }} #ride-go-mcs

jobs:
  preflight:
    name: Validate CD Configuration
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }} # only run this job if the workflow was triggered manually or if the CI workflow completed successfully. this prevents us from deploying if the CI workflow failed
    outputs:
      can_deploy: ${{ steps.validate.outputs.can_deploy }} # ouptut whether we can deploy at all. this is used to decide whether to run the rest of the workflow or not
      can_k8s_deploy: ${{ steps.validate.outputs.can_k8s_deploy }} # output whether we can deploy to k8s. if not, we might still be able to push images, so this is used to decide whether to run the deploy-to-eks job or not
      missing: ${{ steps.validate.outputs.missing }} # output which required variables/secrets are missing, used for debugging when the workflow is skipped

    steps:
      - name: Check required variables and secrets
        id: validate
        env:
          AWS_REGION: ${{ vars.AWS_REGION }} 
          AWS_ROLE_TO_ASSUME: ${{ secrets.AWS_ROLE_TO_ASSUME }} #secrets from 
          EKS_CLUSTER_NAME: ${{ secrets.EKS_CLUSTER_NAME }}
        run: |
          missing=()

          if [ -z "$AWS_REGION" ]; then missing+=("vars.AWS_REGION"); fi
          if [ -z "$AWS_ROLE_TO_ASSUME" ]; then missing+=("secrets.AWS_ROLE_TO_ASSUME"); fi

          if [ ${#missing[@]} -eq 0 ]; then
            echo "can_deploy=true" >> "$GITHUB_OUTPUT"
            if [ -n "$EKS_CLUSTER_NAME" ]; then
              echo "can_k8s_deploy=true" >> "$GITHUB_OUTPUT"
            else
              echo "can_k8s_deploy=false" >> "$GITHUB_OUTPUT"
            fi
            echo "missing=none" >> "$GITHUB_OUTPUT"
          else
            echo "can_deploy=false" >> "$GITHUB_OUTPUT"
            echo "can_k8s_deploy=false" >> "$GITHUB_OUTPUT"
            echo "missing=${missing[*]}" >> "$GITHUB_OUTPUT"
          fi

  build-and-push-images:
    name: Build and Push Images
    runs-on: ubuntu-latest
    needs: preflight
    if: ${{ needs.preflight.outputs.can_deploy == 'true' }}

    strategy: # strategy allows us to define a matrix of different configurations to run the same steps with. here we use it to build and push all our images with the same steps by just changing the context and dockerfile
      matrix:
        include:
          - image: api-gateway
            dockerfile: infra/production/docker/api-gateway.Dockerfile
          - image: chat-service
            dockerfile: infra/production/docker/chat-service.Dockerfile
          - image: dlq-worker
            dockerfile: infra/production/docker/dlq-worker.Dockerfile
          - image: driver-service
            dockerfile: infra/production/docker/driver-service.Dockerfile
          - image: login-service
            dockerfile: infra/production/docker/login-service.Dockerfile
          - image: payment-service
            dockerfile: infra/production/docker/payment-service.Dockerfile
          - image: trip-service
            dockerfile: infra/production/docker/trip-service.Dockerfile
          - image: web
            dockerfile: infra/production/docker/web.Dockerfile
          - image: ws-gateway
            dockerfile: infra/production/docker/ws-gateway.Dockerfile

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials # this is needed to push images to ECR
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push ${{ matrix.image }} # matrix.image is set in the strategy.include section above, this allows us to use the same steps to build and push all images by just changing the context and dockerfile
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }} # this is the ECR registry URI that we get from the login step, we need it to tag the images correctly before pushing. output of a step can be accessed in later steps using steps.{step_id}.outputs.{output_name}. registry is an output provided by the aws-actions/amazon-ecr-login action that contains the URI of the ECR registry we should push to
        run: |
          if [ -n "${{ env.ECR_REPOSITORY }}" ]; then
            REPOSITORY="${{ env.ECR_REPOSITORY }}"
            IMAGE_TAG="${{ matrix.image }}-${{ github.sha }}"
            LATEST_TAG="${{ matrix.image }}-latest"
          elif [ -n "${{ env.ECR_REPOSITORY_PREFIX }}" ]; then
            REPOSITORY="${{ env.ECR_REPOSITORY_PREFIX }}/${{ matrix.image }}"
            IMAGE_TAG="${{ github.sha }}"
            LATEST_TAG="latest"
          else
            REPOSITORY="${{ github.event.repository.name }}/${{ matrix.image }}"
            IMAGE_TAG="${{ github.sha }}"
            LATEST_TAG="latest"
          fi

          if ! aws ecr describe-repositories --repository-names "$REPOSITORY" >/dev/null 2>&1; then
            aws ecr create-repository --repository-name "$REPOSITORY" >/dev/null 2>&1 || \
              aws ecr describe-repositories --repository-names "$REPOSITORY" >/dev/null
          fi

          IMAGE_URI="${REGISTRY}/${REPOSITORY}:${IMAGE_TAG}"
          LATEST_URI="${REGISTRY}/${REPOSITORY}:${LATEST_TAG}"

          BUILD_ARGS=()
          if [ "${{ matrix.image }}" = "web" ]; then
            BUILD_ARGS+=(--build-arg "NEXT_PUBLIC_API_URL=https://api.rexy.co.in")
            BUILD_ARGS+=(--build-arg "NEXT_PUBLIC_WEBSOCKET_URL=wss://ws.rexy.co.in/ws")
          fi

          docker build \
            --platform linux/amd64 \
            "${BUILD_ARGS[@]}" \
            -f "${{ matrix.dockerfile }}" \
            -t "$IMAGE_URI" \
            -t "$LATEST_URI" \
            .
          docker push "$IMAGE_URI"
          docker push "$LATEST_URI"

  deploy-to-eks:
    name: Deploy to EKS
    runs-on: ubuntu-latest
    needs:
      - preflight
      - build-and-push-images
    if: ${{ needs.build-and-push-images.result == 'success' && needs.preflight.outputs.can_k8s_deploy == 'true' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      - name: Setup Helm
        uses: azure/setup-helm@v4

      - name: Update kubeconfig for EKS
        run: aws eks update-kubeconfig --name "${{ secrets.EKS_CLUSTER_NAME }}" --region "${{ env.AWS_REGION }}"

      - name: Ensure External Secrets CRDs are installed
        run: |
          set -euo pipefail

          REQUIRED_CRDS=(
            "clustersecretstores.external-secrets.io"
            "externalsecrets.external-secrets.io"
            "secretstores.external-secrets.io"
          )

          OPTIONAL_CRDS=(
            "clusterexternalsecrets.external-secrets.io"
            "pushsecrets.external-secrets.io"
          )

          missing_required=0
          for crd in "${REQUIRED_CRDS[@]}"; do
            if ! kubectl get crd "$crd" >/dev/null 2>&1; then
              echo "Missing required CRD: $crd"
              missing_required=1
            fi
          done

          if [ "$missing_required" -eq 1 ]; then
            EXTERNAL_SECRETS_CRDS_URL="https://raw.githubusercontent.com/external-secrets/external-secrets/v0.14.4/deploy/crds/bundle.yaml"
            curl -fsSL --retry 5 --retry-delay 3 --retry-all-errors "$EXTERNAL_SECRETS_CRDS_URL" -o /tmp/external-secrets-crds.yaml
            kubectl apply -f /tmp/external-secrets-crds.yaml
          else
            echo "Required External Secrets CRDs already exist; skipping CRD bundle apply to avoid storage-version conflicts."
          fi

          for crd in "${REQUIRED_CRDS[@]}"; do
            kubectl wait --for=condition=Established --timeout=180s "crd/${crd}"
          done

          for crd in "${OPTIONAL_CRDS[@]}"; do
            if kubectl get crd "$crd" >/dev/null 2>&1; then
              kubectl wait --for=condition=Established --timeout=180s "crd/${crd}"
            else
              echo "Optional CRD not present in bundle: $crd"
            fi
          done

          kubectl get crd | grep 'external-secrets.io'

      - name: Install External Secrets controller
        run: |
          set -euo pipefail

          helm repo add external-secrets https://charts.external-secrets.io
          helm repo update

          helm upgrade --install external-secrets external-secrets/external-secrets \
            --namespace external-secrets \
            --create-namespace \
            --version 0.14.4 \
            --set installCRDs=false \
            --set processClusterExternalSecret=false \
            --set serviceAccount.name=external-secrets

          kubectl rollout status deployment/external-secrets -n external-secrets --timeout=180s

      - name: Render production manifests
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          mkdir -p rendered
          cp -R infra/production/k8s/. rendered/

          image_uri() {
            local image_name="$1"
            local repository
            local image_tag
            if [ -n "${{ env.ECR_REPOSITORY }}" ]; then
              repository="${{ env.ECR_REPOSITORY }}"
              image_tag="${image_name}-${{ github.sha }}"
            elif [ -n "${{ env.ECR_REPOSITORY_PREFIX }}" ]; then
              repository="${{ env.ECR_REPOSITORY_PREFIX }}/${image_name}"
              image_tag="${{ github.sha }}"
            else
              repository="${{ github.event.repository.name }}/${image_name}"
              image_tag="${{ github.sha }}"
            fi
            echo "${REGISTRY}/${repository}:${image_tag}"
          }

          IMAGES=(
            api-gateway
            chat-service
            dlq-worker
            driver-service
            login-service
            payment-service
            trip-service
            web
            ws-gateway
          )

          for image in "${IMAGES[@]}"; do
            uri="$(image_uri "$image")"
            find rendered -type f -name '*.yaml' -exec sed -i "s|IMAGE_PLACEHOLDER/${image}|${uri}|g" {} +
          done

      - name: Ensure External Secrets API version compatibility
        run: |
          set -euo pipefail

          if kubectl explain secretstore --api-version=external-secrets.io/v1 >/dev/null 2>&1; then
            echo "External Secrets v1 API is available"
            exit 0
          fi

          if kubectl explain secretstore --api-version=external-secrets.io/v1beta1 >/dev/null 2>&1; then
            echo "External Secrets v1 API is unavailable; falling back manifests to v1beta1"
            find rendered -type f \( -name 'secretstore-aws-secretsmanager.yaml' -o -name 'externalsecrets.yaml' \) \
              -exec sed -i 's|external-secrets.io/v1|external-secrets.io/v1beta1|g' {} +
            exit 0
          fi

          echo "Neither external-secrets.io/v1 nor external-secrets.io/v1beta1 is available in this cluster"
          exit 1

      - name: Apply manifests
        run: |
          set -euo pipefail

          apply_if_exists() {
            local file="$1"
            if [ -f "$file" ]; then
              kubectl apply -f "$file"
            fi
          }

          # 1) Cluster/runtime prerequisites first
          apply_if_exists rendered/storageclass-gp3-csi.yaml
          apply_if_exists rendered/app-config.yaml

          # 1b) Observability config and sinks
          apply_if_exists rendered/observability/loki-config.yaml
          apply_if_exists rendered/observability/otel-gateway-configmap.yaml
          apply_if_exists rendered/observability/otel-agent-configmap.yaml
          apply_if_exists rendered/observability/prometheus-config.yaml
          apply_if_exists rendered/observability/grafana-datasources.yaml
          apply_if_exists rendered/observability/grafana-dashboard-providers.yaml
          apply_if_exists rendered/observability/grafana-dashboards.yaml

          apply_if_exists rendered/observability/loki-statefulset.yaml
          apply_if_exists rendered/observability/collector-gateway-deployment.yaml
          apply_if_exists rendered/observability/collector-agent-daemonset.yaml
          apply_if_exists rendered/observability/prometheus-deployment.yaml
          apply_if_exists rendered/observability/grafana-deployment.yaml

          # 2) Secrets integration before workloads
          apply_if_exists rendered/secretstore-aws-secretsmanager.yaml
          apply_if_exists rendered/externalsecrets.yaml

          kubectl wait --for=condition=Ready --timeout=180s secretstore/aws-secretsmanager -n default
          kubectl wait --for=condition=Ready --timeout=180s externalsecret --all -n default

          # 3) Stateful dependencies
          apply_if_exists rendered/postgres-deployment.yaml
          apply_if_exists rendered/rabbitmq-deployment.yaml
          apply_if_exists rendered/redis-deployment.yaml

          # 4) Application workloads
          for f in \
            rendered/login-service-deployment.yaml \
            rendered/driver-service-deployment.yaml \
            rendered/trip-service-deployment.yaml \
            rendered/payment-service-deployment.yaml \
            rendered/chat-service-deployment.yaml \
            rendered/ws-gateway-deployment.yaml \
            rendered/api-gateway-deployment.yaml \
            rendered/web-deployment.yaml \
            rendered/dlq-worker-deployment.yaml
          do
            apply_if_exists "$f"
          done

          # 5) Public entrypoint last
          apply_if_exists rendered/ingress.yaml

      - name: Wait for core workloads
        run: |
          set -euo pipefail

          # Observability core
          kubectl rollout status deployment/otel-collector-gateway -n default --timeout=300s
          kubectl rollout status statefulset/loki -n default --timeout=300s
          kubectl rollout status deployment/prometheus -n default --timeout=300s
          kubectl rollout status deployment/grafana -n default --timeout=300s

          # Stateful dependencies first
          kubectl rollout status statefulset/rabbitmq -n default --timeout=300s
          kubectl rollout status statefulset/redis -n default --timeout=300s

          # Core platform workloads
          kubectl rollout status deployment/postgres -n default --timeout=300s
          kubectl rollout status deployment/login-service -n default --timeout=300s
          kubectl rollout status deployment/driver-service -n default --timeout=300s
          kubectl rollout status deployment/trip-service -n default --timeout=300s
          kubectl rollout status deployment/payment-service -n default --timeout=300s
          kubectl rollout status deployment/chat-service -n default --timeout=300s
          kubectl rollout status deployment/ws-gateway -n default --timeout=300s
          kubectl rollout status deployment/api-gateway -n default --timeout=300s
          kubectl rollout status deployment/web -n default --timeout=300s

      - name: Collect diagnostics on failure
        if: ${{ failure() }}
        run: |
          set +e
          mkdir -p diagnostics

          kubectl get pods -A -o wide > diagnostics/pods.txt
          kubectl get svc -A > diagnostics/services.txt
          kubectl get ingress -A > diagnostics/ingress.txt
          kubectl get endpoints -n default > diagnostics/endpoints-default.txt
          kubectl get externalsecret -n default > diagnostics/externalsecrets.txt
          kubectl get secretstore -n default > diagnostics/secretstores.txt
          kubectl get pvc -n default > diagnostics/pvc-default.txt
          kubectl get events -A --sort-by=.lastTimestamp > diagnostics/events.txt

          # Collect describe + logs for not-ready pods across namespaces.
          kubectl get pods -A --no-headers | awk '
            {
              split($3, a, "/");
              ready=(a[1]==a[2]);
              status=$4;
              if (!ready || (status != "Running" && status != "Completed")) {
                print $1, $2;
              }
            }
          ' > diagnostics/not_ready_pods.txt

          while read -r ns pod; do
            [ -z "$ns" ] && continue
            echo "=== ${ns}/${pod} describe ===" >> diagnostics/pod-describe.txt
            kubectl describe pod -n "$ns" "$pod" >> diagnostics/pod-describe.txt 2>&1
            echo >> diagnostics/pod-describe.txt

            echo "=== ${ns}/${pod} logs ===" >> diagnostics/pod-logs.txt
            kubectl logs -n "$ns" "$pod" --all-containers --tail=300 >> diagnostics/pod-logs.txt 2>&1
            echo >> diagnostics/pod-logs.txt

            echo "=== ${ns}/${pod} previous logs ===" >> diagnostics/pod-logs-previous.txt
            kubectl logs -n "$ns" "$pod" --all-containers --previous --tail=300 >> diagnostics/pod-logs-previous.txt 2>&1
            echo >> diagnostics/pod-logs-previous.txt
          done < diagnostics/not_ready_pods.txt

          # Surface key diagnostics directly in workflow output.
          echo "----- NOT READY PODS -----"
          cat diagnostics/not_ready_pods.txt || true
          echo "----- LAST EVENTS -----"
          tail -n 200 diagnostics/events.txt || true

      - name: Upload diagnostics artifact
        if: ${{ failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: deploy-diagnostics-${{ github.run_id }}
          path: diagnostics
          if-no-files-found: ignore

  missing-config:
    name: Missing Config Warning
    runs-on: ubuntu-latest
    needs: preflight
    if: ${{ needs.preflight.outputs.can_deploy != 'true' }}

    steps:
      - name: Explain required configuration
        run: |
          echo "CD was skipped because required repository configuration is missing."
          echo "Missing: ${{ needs.preflight.outputs.missing }}"
          echo "Required variables: AWS_REGION"
          echo "Optional variables: ECR_REPOSITORY (single repo mode), ECR_REPOSITORY_PREFIX (multi-repo mode)"
          echo "Required secret: AWS_ROLE_TO_ASSUME"
          echo "Optional for deploy: EKS_CLUSTER_NAME"
